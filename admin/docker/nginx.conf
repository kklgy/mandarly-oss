# mandarly-admin 容器内 nginx
# 仅 serve /admin/* 静态产物 + Vue Router history 模式 fallback
# 不做反向代理(API 反代由 gateway 容器统一负责)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # 健康检查(不计 access log)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # /admin/ 子路径(VITE_BASE=/admin/ 构建)
    # history 路由刷新 / 直链访问时,落到 /admin/index.html
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # 静态资源 cache(hashed filename 安全长缓存)
    location ~* ^/admin/.+\.(js|css|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
