<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png?v=v20260525-logo-client" />

    <!-- 默认 SEO meta(每页可通过 useHead / 动态 head 覆盖,详见 docs/frontend/seo-geo-checklist.md)-->
    <title>Mandarly · Learn Mandarin Online · 1-on-1 Native Tutors</title>
    <meta name="description" content="Learn Mandarin Chinese online 1-on-1 with vetted native teachers. Speaking, business Chinese, HSK, kids Mandarin, and a free 30-second level test." />
    <meta name="keywords" content="learn Mandarin online, Chinese tutor, 1-on-1 Mandarin, HSK, business Chinese, native Chinese teacher, kids Mandarin" />
    <meta name="author" content="Mandarly" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mandarly.com/" />

    <!-- Open Graph(Facebook / WhatsApp / 朋友圈分享卡片)-->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mandarly" />
    <meta property="og:title" content="Mandarly · Learn Mandarin Online" />
    <meta property="og:description" content="1-on-1 online Mandarin learning with vetted native Chinese teachers. Speaking, Business, HSK, and Kids Mandarin." />
    <meta property="og:image" content="https://mandarly.com/cover-mandarly-1500x500.png" />
    <meta property="og:image:width" content="1500" />
    <meta property="og:image:height" content="500" />
    <meta property="og:url" content="https://mandarly.com/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="zh_CN" />
    <meta property="og:locale:alternate" content="zh_TW" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mandarly · Learn Mandarin Online" />
    <meta name="twitter:description" content="1-on-1 online Mandarin learning with native Chinese teachers. Speaking, Business, HSK, Kids." />
    <meta name="twitter:image" content="https://mandarly.com/cover-mandarly-1500x500.png" />

    <!-- 主题色(浏览器地址栏 / iOS Safari)-->
    <meta name="theme-color" content="#FFB627" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- 多语言版本(hreflang;一期 SPA 同 URL,留 backlog 重构 /zh /en 分路径)-->
    <link rel="alternate" hreflang="zh-CN" href="https://mandarly.com/" />
    <link rel="alternate" hreflang="zh-TW" href="https://mandarly.com/" />
    <link rel="alternate" hreflang="en" href="https://mandarly.com/" />
    <link rel="alternate" hreflang="x-default" href="https://mandarly.com/" />

    <!-- 结构化数据 JSON-LD:Organization + EducationalOrganization(每个公开页面可叠加更具体的)-->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EducationalOrganization",
        "name": "Mandarly",
        "alternateName": "曼德勵",
        "url": "https://mandarly.com/",
        "logo": "https://mandarly.com/logo-256.png",
        "description": "1-on-1 online Mandarin learning for Hong Kong and overseas Chinese learners, taught by vetted native Chinese teachers.",
        "sameAs": []
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
