<?xml version="1.0" encoding="UTF-8"?>
<!--
  Auth Register Illustration — 萌芽 / 礼物盒 / 欢迎
  P0 fallback: 主色渐变 + 礼物盒几何形 + 信封 logo
-->
<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mandarly Register">
  <defs>
    <linearGradient id="regGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC34D"/>
      <stop offset="100%" stop-color="#AC722C"/>
    </linearGradient>
    <linearGradient id="regGiftLid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#AC722C"/>
      <stop offset="100%" stop-color="#D09A4C"/>
    </linearGradient>
  </defs>

  <!-- 背景柔和形 -->
  <circle cx="80" cy="100" r="60" fill="#FFF6E5" opacity="0.8"/>
  <circle cx="320" cy="320" r="80" fill="#FFF6E5" opacity="0.6"/>
  <ellipse cx="200" cy="220" rx="160" ry="130" fill="url(#regGrad)" opacity="0.18"/>

  <!-- 礼物盒身 -->
  <g transform="translate(120 160)">
    <rect x="0" y="40" width="160" height="120" rx="8" fill="url(#regGrad)"/>
    <!-- 礼物盒盖 -->
    <rect x="-8" y="20" width="176" height="36" rx="6" fill="url(#regGiftLid)"/>
    <!-- 中央竖丝带 -->
    <rect x="72" y="20" width="16" height="140" fill="#FFF6E5" opacity="0.9"/>
    <!-- 横丝带(盖上) -->
    <rect x="-8" y="30" width="176" height="10" fill="#FFF6E5" opacity="0.9"/>
    <!-- 蝴蝶结 -->
    <ellipse cx="60" cy="20" rx="22" ry="12" fill="#FFF6E5" opacity="0.95"/>
    <ellipse cx="100" cy="20" rx="22" ry="12" fill="#FFF6E5" opacity="0.95"/>
    <circle cx="80" cy="20" r="8" fill="#AC722C"/>
  </g>

  <!-- 萌芽小叶(右上) -->
  <g transform="translate(295 90)">
    <path d="M0 30 Q15 0 30 18 Q15 30 0 30 Z" fill="#D09A4C" opacity="0.7"/>
    <path d="M30 30 Q45 0 60 18 Q45 30 30 30 Z" fill="#AC722C" opacity="0.65"/>
    <line x1="30" y1="30" x2="30" y2="60" stroke="#AC722C" stroke-width="2"/>
  </g>

  <!-- 闪光小点 -->
  <circle cx="50" cy="280" r="4" fill="#D09A4C"/>
  <circle cx="350" cy="200" r="5" fill="#AC722C"/>
  <circle cx="100" cy="60" r="3" fill="#D09A4C" opacity="0.7"/>
</svg>
