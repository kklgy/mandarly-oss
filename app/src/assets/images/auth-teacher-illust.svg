<?xml version="1.0" encoding="UTF-8"?>
<!--
  Auth Teacher Register Illustration — 讲台 / 教学视角
  P0 fallback: 主色渐变 + 讲台 / 黑板 + 中文"中"字
-->
<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mandarly Teacher Register">
  <defs>
    <linearGradient id="teacherGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC34D"/>
      <stop offset="100%" stop-color="#AC722C"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="200" cy="200" r="160" fill="url(#teacherGrad)" opacity="0.15"/>
  <circle cx="60" cy="60" r="40" fill="#FFF6E5" opacity="0.85"/>
  <circle cx="350" cy="340" r="45" fill="#FFF6E5" opacity="0.75"/>

  <!-- 黑板/白板 -->
  <g transform="translate(80 100)">
    <rect x="0" y="0" width="240" height="140" rx="10" fill="#FFFFFF" stroke="#AC722C" stroke-width="3"/>
    <!-- 上方标题条 -->
    <rect x="0" y="0" width="240" height="18" rx="10" fill="url(#teacherGrad)"/>
    <rect x="0" y="9" width="240" height="9" fill="url(#teacherGrad)"/>

    <!-- 中央"中"字简笔(代表中文) -->
    <g transform="translate(120 80)" stroke="#AC722C" stroke-width="6" stroke-linecap="round" fill="none">
      <line x1="-30" y1="-30" x2="30" y2="-30"/>
      <line x1="-30" y1="30" x2="30" y2="30"/>
      <line x1="-30" y1="-30" x2="-30" y2="30"/>
      <line x1="30" y1="-30" x2="30" y2="30"/>
      <line x1="0" y1="-50" x2="0" y2="50"/>
    </g>
  </g>

  <!-- 讲台 -->
  <g transform="translate(120 250)">
    <rect x="0" y="0" width="160" height="20" rx="4" fill="#AC722C"/>
    <rect x="20" y="20" width="120" height="60" fill="#D09A4C" opacity="0.85"/>
    <!-- 讲台标志(信封 mini logo) -->
    <rect x="64" y="40" width="32" height="22" rx="3" fill="#FFFFFF" stroke="#AC722C" stroke-width="1.5"/>
    <path d="M64 43 L80 56 L96 43" stroke="#AC722C" stroke-width="1.5" fill="none"/>
  </g>

  <!-- 装饰星星/闪光 -->
  <circle cx="60" cy="200" r="4" fill="#D09A4C"/>
  <circle cx="340" cy="160" r="5" fill="#AC722C"/>
  <circle cx="320" cy="80" r="3" fill="#D09A4C" opacity="0.6"/>
</svg>
