<?xml version="1.0" encoding="UTF-8"?>
<!--
  Auth Reset Password Illustration — 钥匙 / 锁的循环
  P0 fallback: 主色渐变 + 钥匙 + 锁形几何
-->
<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mandarly Reset Password">
  <defs>
    <linearGradient id="resetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC34D"/>
      <stop offset="100%" stop-color="#AC722C"/>
    </linearGradient>
  </defs>

  <!-- 背景柔和形 -->
  <circle cx="200" cy="200" r="160" fill="url(#resetGrad)" opacity="0.15"/>
  <circle cx="320" cy="100" r="50" fill="#FFF6E5" opacity="0.7"/>
  <circle cx="80" cy="320" r="55" fill="#FFF6E5" opacity="0.6"/>

  <!-- 锁身 -->
  <g transform="translate(150 180)">
    <rect x="0" y="40" width="100" height="100" rx="14" fill="url(#resetGrad)"/>
    <!-- 锁挂钩(U 形) -->
    <path d="M 18 44 L 18 26 Q 18 0 50 0 Q 82 0 82 26 L 82 44"
          stroke="#AC722C" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- 锁眼 -->
    <circle cx="50" cy="80" r="10" fill="#FFFFFF"/>
    <rect x="46" y="86" width="8" height="22" rx="2" fill="#FFFFFF"/>
  </g>

  <!-- 钥匙(右下,旋转 30deg) -->
  <g transform="translate(280 240) rotate(30)">
    <!-- 钥匙头(圆环) -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="#AC722C" stroke-width="6"/>
    <circle cx="0" cy="0" r="6" fill="#AC722C"/>
    <!-- 钥匙杆 -->
    <rect x="20" y="-3" width="56" height="6" rx="2" fill="#AC722C"/>
    <!-- 齿 -->
    <rect x="60" y="3" width="6" height="10" fill="#AC722C"/>
    <rect x="70" y="3" width="6" height="14" fill="#AC722C"/>
  </g>

  <!-- 循环箭头(轻装饰,右上) -->
  <g transform="translate(290 80)" stroke="#D09A4C" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M 0 20 A 22 22 0 1 1 22 42"/>
    <path d="M 22 42 L 16 36 M 22 42 L 30 36" stroke-linejoin="round"/>
  </g>

  <!-- 闪光点 -->
  <circle cx="60" cy="100" r="4" fill="#D09A4C"/>
  <circle cx="340" cy="320" r="5" fill="#AC722C"/>
</svg>
